server {
    listen 80;
    server_name casagrito.luis-tech.online;
    # Force HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name casagrito.luis-tech.online;

    # SSL Certificates (Mounted from Host)
    ssl_certificate /etc/letsencrypt/live/casagrito.luis-tech.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/casagrito.luis-tech.online/privkey.pem;

    # --- SECURITY HARDENING ---
    # Hide Nginx version (Prevents attackers from knowing specific vulnerabilities)
    server_tokens off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always; # Prevents Clickjacking
    add_header X-XSS-Protection "1; mode=block" always; # Prevents XSS
    add_header X-Content-Type-Options "nosniff" always; # Prevents MIME-sniffing
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    # --- END SECURITY HARDENING ---

    client_max_body_size 10M;

    # 1. API BACKEND
    location /api {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 2. FRONTEND NEXT.JS
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}